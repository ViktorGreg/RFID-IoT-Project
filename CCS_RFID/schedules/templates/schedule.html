{% extends "base.html" %}
{% load static %}

{% block content %}
<!-- Main Content -->
<div class="flex-1 p-3 md:p-6 min-h-screen">
    <!-- Header Section -->
    <div class="mb-4 md:mb-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-4">
            <div class="mb-3 md:mb-0">
                <h2 class="text-xl md:text-2xl font-bold text-gray-900 mb-1 md:mb-2">Class Schedule</h2>
                <p class="text-sm md:text-base text-gray-600">Your weekly class schedule</p>
            </div>
            <div class="flex space-x-2">
                <button id="refreshScheduleBtn"
                    class="bg-maroon text-white px-5 py-3 rounded-lg hover:bg-maroon-dark transition-all shadow-md flex items-center justify-center space-x-2 min-h-[48px]">
                    <i class="fas fa-sync-alt"></i>
                    <span class="font-medium">Refresh</span>
                </button>
                <button id="print-schedule-btn-mobile"
                    class="bg-maroon text-white px-5 py-3 rounded-lg hover:bg-maroon-dark transition-all shadow-md flex items-center justify-center space-x-2 min-h-[48px] md:hidden">
                    <i class="fas fa-print"></i>
                    <span class="font-medium">Print</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Debug Info -->
    <div id="debugInfo" class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-4 hidden">
        <p class="text-sm text-yellow-700" id="debugMessage"></p>
    </div>

    <!-- Loading Indicator -->
    <div id="loadingIndicator" class="hidden bg-white rounded-xl shadow-sm p-8 mb-5 text-center">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-maroon mb-3"></div>
        <p class="text-gray-600">Loading schedule...</p>
    </div>

    <!-- Desktop Schedule Grid -->
    <div class="desktop-schedule bg-white rounded-xl shadow-sm p-4 mb-8 schedule-container">
        <div class="schedule-grid" id="schedule-grid"></div>
    </div>

    <!-- Mobile Schedule View -->
    <div class="mobile-day-view bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="mobile-day-header">
            <div class="mobile-day-selector">
                <button class="mobile-day-tab active" data-day="monday">Monday</button>
                <button class="mobile-day-tab" data-day="tuesday">Tuesday</button>
                <button class="mobile-day-tab" data-day="wednesday">Wednesday</button>
                <button class="mobile-day-tab" data-day="thursday">Thursday</button>
                <button class="mobile-day-tab" data-day="friday">Friday</button>
                <button class="mobile-day-tab" data-day="saturday">Saturday</button>
                <button class="mobile-day-tab" data-day="sunday">Sunday</button>
            </div>
        </div>
        
        <div class="mobile-day-content" id="mobileDayContent">
            <div class="p-8 text-center text-gray-500">
                <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                <p>Loading schedule...</p>
            </div>
        </div>
    </div>
</div>

<!-- Info Modal -->
<div id="info-modal" class="fixed inset-0 bg-black bg-opacity-60 z-[9999] hidden flex items-center justify-center p-4 popup-modal">
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full mx-4 popup-content">
        <div class="p-5 md:p-6">
            <div class="text-center">
                <div class="w-14 h-14 md:w-16 md:h-16 mx-auto mb-4 bg-maroon/10 rounded-full flex items-center justify-center">
                    <i class="fas fa-info-circle text-maroon text-xl md:text-2xl"></i>
                </div>
                <h3 class="text-base md:text-lg font-bold text-gray-900 mb-2" id="info-title">Class Details</h3>
                <div class="text-left text-sm md:text-base text-gray-600 mb-6" id="info-content"></div>
                <button id="close-info-modal" class="w-full px-4 py-3 bg-maroon text-white rounded-lg hover:bg-maroon-dark transition-colors font-medium min-h-[48px]">Close</button>
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.3) translateY(-50px); } 50% { opacity: 1; transform: scale(1.05); } 70% { transform: scale(0.98); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    .schedule-grid { display: grid; grid-template-columns: 100px repeat(7, 1fr); gap: 0; position: relative; }
    @media (min-width: 768px) { .schedule-grid { grid-template-columns: 120px repeat(7, 1fr); } }
    
    .time-slot { min-height: 100px; border-right: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; position: relative; background: white; }
    
    .schedule-item { position: absolute; color: white; border-radius: 6px; padding: 10px; font-size: 12px; cursor: pointer; transition: all 0.2s ease; overflow: hidden; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,0.15); border: 2px solid rgba(255,255,255,0.4); left: 4px !important; right: 4px !important; width: calc(100% - 8px) !important; }
    .schedule-item:hover { box-shadow: 0 6px 12px rgba(0,0,0,0.25); transform: translateY(-2px) scale(1.02); z-index: 200; border-color: rgba(255,255,255,0.6); }
    
    .time-column { background-color: #f9fafb; border-right: 2px solid #d1d5db; border-bottom: 1px solid #e5e7eb; font-weight: 600; color: #7B1C24; padding: 8px; font-size: 13px; display: flex; align-items: center; justify-content: flex-end; min-height: 100px; }
    .day-header { background: linear-gradient(to bottom, #f9fafb, #f3f4f6); font-weight: 700; color: #7B1C24; text-align: center; padding: 16px 8px; border-bottom: 2px solid #d1d5db; border-right: 1px solid #e5e7eb; font-size: 13px; letter-spacing: 0.5px; }
    
    .mobile-day-view { display: none; }
    @media (max-width: 767px) { .mobile-day-view { display: block; } .desktop-schedule { display: none; } .mobile-day-header { position: sticky; top: 56px; background: white; z-index: 10; padding: 12px; border-bottom: 2px solid #e5e7eb; } .mobile-day-selector { display: flex; overflow-x: auto; padding-bottom: 8px; gap: 8px; -webkit-overflow-scrolling: touch; scrollbar-width: none; } .mobile-day-selector::-webkit-scrollbar { display: none; } .mobile-day-tab { flex: 0 0 auto; padding: 10px 20px; border-radius: 20px; background: #f3f4f6; color: #6b7280; font-weight: 500; white-space: nowrap; font-size: 14px; min-height: 44px; display: flex; align-items: center; } .mobile-day-tab.active { background: #7B1C24; color: white; } .mobile-time-slot { padding: 16px; border-bottom: 1px solid #e5e7eb; min-height: 60px; cursor: pointer; } .mobile-time-slot:hover { background: #f9fafb; } }
    
    .popup-modal { backdrop-filter: blur(4px); animation: fadeIn 0.3s ease-out; }
    .popup-content { animation: bounceIn 0.4s ease-out; }
    .schedule-container { max-height: calc(100vh - 200px); overflow-y: auto; overflow-x: auto; }
    
    @media print { body * { visibility: hidden; } .schedule-container, .schedule-container * { visibility: visible; } .schedule-container { position: absolute; top: 0; left: 0; width: 100%; margin: 0; padding: 0; } .mobile-day-view { display: none !important; } .desktop-schedule { display: block !important; } button, .no-print { display: none !important; } }
</style>

<script>
    const WORK_START_HOUR = 6;
    const WORK_END_HOUR = 21;
    const TIME_SLOT_HEIGHT = 100;
    const PIXELS_PER_MINUTE = TIME_SLOT_HEIGHT / 60;

    let scheduleData = {};
    let isLoading = false;

    // Function to extract day from raw string like "T (Lec 2.00) (Lab 0.00)"
    function extractDay(rawDay) {
        if (!rawDay) return '';
        
        rawDay = rawDay.toString().trim().toUpperCase();
        
        const dayMap = {
            'M': 'monday',
            'MON': 'monday',
            'MONDAY': 'monday',
            'T': 'tuesday',
            'TUE': 'tuesday',
            'TUESDAY': 'tuesday',
            'W': 'wednesday',
            'WED': 'wednesday',
            'WEDNESDAY': 'wednesday',
            'TH': 'thursday',
            'THU': 'thursday',
            'THURSDAY': 'thursday',
            'F': 'friday',
            'FRI': 'friday',
            'FRIDAY': 'friday',
            'S': 'saturday',
            'SAT': 'saturday',
            'SATURDAY': 'saturday',
            'SUN': 'sunday',
            'SUNDAY': 'sunday'
        };
        
        for (const [abbr, fullDay] of Object.entries(dayMap)) {
            if (rawDay.startsWith(abbr)) {
                return fullDay;
            }
        }
        
        return 'monday';
    }

    const daysList = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
    const colors = ['#7B1C24', '#9e2430', '#6B1820', '#8B2028', '#A52834', '#5A1219'];

    function timeToMinutes(timeStr) {
        if (!timeStr) return 0;
        if (typeof timeStr === 'string' && timeStr.match(/^\d{1,2}:\d{2}$/)) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            return hours * 60 + minutes;
        }
        return 0;
    }

    function minutesToTime(minutes) {
        let hours = Math.floor(minutes / 60);
        const mins = minutes % 60;
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        if (hours === 0) hours = 12;
        return `${hours}:${mins.toString().padStart(2, '0')} ${ampm}`;
    }

    function formatTime24to12(time24) {
        if (!time24) return '';
        const [hours, minutes] = time24.split(':').map(Number);
        const ampm = hours >= 12 ? 'PM' : 'AM';
        let hour12 = hours % 12;
        if (hour12 === 0) hour12 = 12;
        return `${hour12}:${minutes.toString().padStart(2, '0')} ${ampm}`;
    }

    function generateScheduleGrid() {
        const scheduleGrid = document.getElementById('schedule-grid');
        if (!scheduleGrid) return;
        
        scheduleGrid.innerHTML = '';
        
        // Add day headers
        scheduleGrid.innerHTML += '<div class="time-column rounded-tl-lg border-0"></div>';
        daysList.forEach(day => {
            scheduleGrid.innerHTML += `<div class="day-header">${day.toUpperCase()}</div>`;
        });
        
        // Add time slots
        for (let hour = WORK_START_HOUR; hour < WORK_END_HOUR; hour++) {
            scheduleGrid.innerHTML += `<div class="time-column">${minutesToTime(hour * 60)}</div>`;
            daysList.forEach(day => {
                scheduleGrid.innerHTML += `<div class="time-slot" data-day="${day}" data-time="${hour * 60}" data-hour="${hour}"></div>`;
            });
        }
    }

    function calculateEventPosition(event) {
        const startMinutes = timeToMinutes(event.start_time);
        const endMinutes = timeToMinutes(event.end_time);
        const duration = endMinutes - startMinutes;
        const minutesFromStart = startMinutes - (WORK_START_HOUR * 60);
        const top = minutesFromStart * PIXELS_PER_MINUTE;
        const height = duration * PIXELS_PER_MINUTE;
        return { top, height: Math.max(height, 80) };
    }

    function updateScheduleDisplay() {
        // Clear existing items
        document.querySelectorAll('.schedule-item').forEach(item => item.remove());
        
        // Get all time slot cells
        const dayCells = {};
        daysList.forEach(day => {
            dayCells[day] = document.querySelectorAll(`.time-slot[data-day="${day}"]`);
        });
        
        const events = Object.values(scheduleData);
        console.log(`Rendering ${events.length} events`);
        
        events.forEach(event => {
            // Extract the day from raw format
            const normalizedDay = extractDay(event.day);
            console.log(`Event: ${event.subject_code}, raw day: '${event.day}', normalized: '${normalizedDay}'`);
            
            const dayIndex = daysList.indexOf(normalizedDay);
            if (dayIndex === -1) {
                console.warn(`Unknown day: ${event.day} for class ${event.subject_code}`);
                return;
            }
            
            const { top, height } = calculateEventPosition(event);
            const startMinutes = timeToMinutes(event.start_time);
            const startHour = Math.floor(startMinutes / 60);
            const hourDiff = startHour - WORK_START_HOUR;
            
            if (hourDiff >= 0 && hourDiff < dayCells[normalizedDay]?.length) {
                const targetCell = dayCells[normalizedDay][hourDiff];
                if (targetCell) {
                    const cellStartMinutes = (WORK_START_HOUR + hourDiff) * 60;
                    const relativeTop = (startMinutes - cellStartMinutes) * PIXELS_PER_MINUTE;
                    
                    const displayStart = formatTime24to12(event.start_time);
                    const displayEnd = formatTime24to12(event.end_time);
                    const colorIndex = (event.subject_code?.charCodeAt(0) || 0) % colors.length;
                    
                    const scheduleItem = document.createElement('div');
                    scheduleItem.className = 'schedule-item';
                    scheduleItem.style.background = colors[colorIndex];
                    scheduleItem.style.top = `${relativeTop}px`;
                    scheduleItem.style.height = `${height}px`;
                    scheduleItem.dataset.id = event.id;
                    scheduleItem.innerHTML = `
                        <div style="font-weight: bold; font-size: 11px;">${event.subject_code}</div>
                        <div style="font-size: 9px; margin-top: 2px;">${displayStart}-${displayEnd}</div>
                        ${height > 70 ? `<div style="font-size: 9px;">${event.room || ''}</div>` : ''}
                    `;
                    scheduleItem.onclick = () => showClassDetails(event);
                    targetCell.appendChild(scheduleItem);
                }
            }
        });
        
        updateMobileDayView();
    }

    function updateMobileDayView() {
        const activeDayElement = document.querySelector('.mobile-day-tab.active');
        const activeDay = activeDayElement ? activeDayElement.dataset.day : 'monday';
        const mobileDayContent = document.getElementById('mobileDayContent');
        
        if (!mobileDayContent) return;
        
        const dayEvents = Object.values(scheduleData)
            .filter(event => extractDay(event.day) === activeDay)
            .sort((a, b) => timeToMinutes(a.start_time) - timeToMinutes(b.start_time));
        
        if (dayEvents.length === 0) {
            mobileDayContent.innerHTML = `<div class="p-8 text-center text-gray-500"><i class="fas fa-calendar-plus text-3xl mb-4"></i><p>No classes scheduled for ${activeDay.charAt(0).toUpperCase() + activeDay.slice(1)}</p></div>`;
            return;
        }
        
        let html = '';
        dayEvents.forEach(event => {
            const displayStart = formatTime24to12(event.start_time);
            const displayEnd = formatTime24to12(event.end_time);
            html += `
                <div class="mobile-time-slot border-b border-gray-200" data-event-id="${event.id}">
                    <div class="flex items-start gap-3 p-3">
                        <div class="w-3 h-3 rounded-full flex-shrink-0 mt-1" style="background-color: #7B1C24"></div>
                        <div class="flex-1 min-w-0">
                            <div class="font-semibold text-gray-900 text-base">${escapeHtml(event.subject_code)} - ${escapeHtml(event.title)}</div>
                            <div class="text-sm text-gray-600 mt-2">${displayStart} - ${displayEnd}</div>
                            ${event.room ? `<div class="text-sm text-gray-600 mt-1">🗺️ Room: ${escapeHtml(event.room)}</div>` : ''}
                            ${event.section ? `<div class="text-sm text-gray-600 mt-1">📚 Section: ${escapeHtml(event.section)}</div>` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
        mobileDayContent.innerHTML = html;
        
        document.querySelectorAll('.mobile-time-slot').forEach(slot => {
            slot.onclick = () => {
                const eventId = slot.dataset.eventId;
                if (scheduleData[eventId]) showClassDetails(scheduleData[eventId]);
            };
        });
    }

    function showClassDetails(event) {
        document.getElementById('info-title').innerHTML = `${escapeHtml(event.subject_code)} - ${escapeHtml(event.title)}`;
        document.getElementById('info-content').innerHTML = `
            <div class="space-y-2">
                <p><strong>📅 Day:</strong> ${escapeHtml(event.day)}</p>
                <p><strong>⏰ Time:</strong> ${formatTime24to12(event.start_time)} - ${formatTime24to12(event.end_time)}</p>
                <p><strong>🚪 Room:</strong> ${escapeHtml(event.room || 'TBA')}</p>
                <p><strong>📚 Section:</strong> ${escapeHtml(event.section || 'N/A')}</p>
                <p><strong>🏛️ College:</strong> ${escapeHtml(event.college || 'N/A')}</p>
                <p><strong>📖 Semester:</strong> ${escapeHtml(event.semester || 'N/A')}</p>
                <p><strong>📅 School Year:</strong> ${escapeHtml(event.school_year || 'N/A')}</p>
            </div>
        `;
        document.getElementById('info-modal').classList.remove('hidden');
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

    async function loadSchedule() {
        if (isLoading) return;
        isLoading = true;
        const loadingEl = document.getElementById('loadingIndicator');
        if (loadingEl) loadingEl.classList.remove('hidden');
        
        try {
            const response = await fetch('/api/teacher-schedule/');
            if (response.ok) {
                const data = await response.json();
                console.log('Received classes:', data);
                
                if (data.error) {
                    console.error('Server error:', data.error);
                    return;
                }
                
                scheduleData = {};
                data.forEach(cls => {
                    console.log(`Processing class: ${cls.subject_code}, raw day: '${cls.day}'`);
                    scheduleData[cls.id] = {
                        id: cls.id,
                        title: cls.subject_description || 'Untitled',
                        subject_code: cls.subject_code,
                        day: cls.day,  // Keep the raw day
                        start_time: cls.time_from || '06:00',
                        end_time: cls.time_to || '19:00',
                        room: cls.room,
                        section: cls.section,
                        college: cls.college,
                        semester: cls.semester,
                        school_year: cls.school_year
                    };
                });
                console.log(`Loaded ${Object.keys(scheduleData).length} classes`);
                updateScheduleDisplay();
            } else {
                console.error('Failed to load schedule:', response.status);
            }
        } catch (error) {
            console.error('Error loading schedule:', error);
        } finally {
            isLoading = false;
            if (loadingEl) loadingEl.classList.add('hidden');
        }
    }

    document.getElementById('refreshScheduleBtn')?.addEventListener('click', () => { generateScheduleGrid(); loadSchedule(); });
    document.getElementById('print-schedule-btn-mobile')?.addEventListener('click', () => window.print());
    document.getElementById('close-info-modal')?.addEventListener('click', () => document.getElementById('info-modal').classList.add('hidden'));
    document.getElementById('info-modal')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden'); });
    
    document.querySelectorAll('.mobile-day-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.mobile-day-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            updateMobileDayView();
        });
    });
    
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') document.getElementById('info-modal').classList.add('hidden'); });
    
    document.addEventListener('DOMContentLoaded', () => {
        generateScheduleGrid();
        loadSchedule();
    });
</script>
{% endblock %}
